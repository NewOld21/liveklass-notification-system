spring.application.name=notification
spring.jackson.time-zone=Asia/Seoul

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:15432/notification}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:notification}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:notification}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=never

jwt.secret=${JWT_SECRET:notification-local-development-secret-key-change-me}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

notification.dispatch.scheduler.enabled=${NOTIFICATION_DISPATCH_SCHEDULER_ENABLED:true}
notification.dispatch.scheduler.fixed-delay-ms=${NOTIFICATION_DISPATCH_SCHEDULER_FIXED_DELAY_MS:5000}
notification.dispatch.scheduler.batch-size=${NOTIFICATION_DISPATCH_SCHEDULER_BATCH_SIZE:50}
